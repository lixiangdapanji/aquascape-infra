name: deploy-infra

# Manual-only for now. Per-env (dev/stage/prod) deploy gated on
# GitHub environment variable `AWS_DEPLOY_ROLE` set by redeploy-phase2.sh.
# Trigger from the Actions tab; auto-push-to-main deploys can be re-enabled
# once prod is safely gated.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        type: choice
        options: [dev, stage, prod]
        default: dev
      stacks:
        description: "Stack pattern (e.g. AquascapeStudio-App-dev or '*')"
        default: "*"

concurrency:
  group: deploy-infra-${{ github.event.inputs.env || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'dev' }}
    env:
      TARGET_ENV: ${{ github.event.inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --no-audit --no-fund

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: us-east-1

      - name: cdk diff
        run: |
          npx cdk diff --context env="$TARGET_ENV" \
            AquascapeStudio-Network-"$TARGET_ENV" \
            AquascapeStudio-Edge-"$TARGET_ENV" \
            AquascapeStudio-App-"$TARGET_ENV" || true

      - name: cdk deploy
        run: |
          npx cdk deploy --require-approval never --context env="$TARGET_ENV" \
            AquascapeStudio-Network-"$TARGET_ENV" \
            AquascapeStudio-Edge-"$TARGET_ENV" \
            AquascapeStudio-App-"$TARGET_ENV"
