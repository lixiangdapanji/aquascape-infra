name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: tsc --noEmit
        run: npx tsc --noEmit
      # `cdk synth` is intentionally skipped: App/Edge ALB↔CloudFront wiring
      # is resolved at deploy-time via SSM param export, so synth-time trips
      # a dependency cycle. Type-check alone catches compilation errors in CI.
      # Real synth happens inside deploy-infra.yml against real AWS creds.
