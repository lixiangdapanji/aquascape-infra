name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: typecheck
        run: npx tsc --noEmit
      # `cdk synth` against the real Edge stack does a Route53 hosted-zone lookup,
      # which requires AWS creds we don't have in CI. Just sanity-check the CDK app
      # loads without throwing by synthing the Bootstrap stack only (no lookups).
      - name: synth bootstrap
        run: npx cdk synth AquascapeStudio-Bootstrap --context env=dev
