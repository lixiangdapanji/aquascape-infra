name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: synth (dev)
        run: npx cdk synth --context env=dev
        env:
          # synth doesn't need real creds, but lookup cache is loaded from cdk.context.json
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: "us-east-1"
